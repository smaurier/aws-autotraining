<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 16 — Serverless avancé</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 16 — Serverless avancé</h1>
    <p class="subtitle">Step Functions, AppSync, EventBridge patterns, CQRS, saga</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 10</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Qu'est-ce qu'AWS Step Functions ?",
        options: [
          "Un service de déploiement par étapes",
          "Un service d'orchestration serverless qui permet de coordonner plusieurs services AWS dans des workflows visuels sous forme de machine à états",
          "Un outil de gestion de versions",
          "Un service de messaging asynchrone"
        ],
        answer: 1,
        explanation: "<strong>Step Functions</strong> permet de créer des workflows (state machines) qui orchestrent des services AWS (Lambda, ECS, DynamoDB, SQS, etc.) avec une gestion automatique des erreurs, retries et parallélisme."
      },
      {
        label: "Question 2",
        text: "Quels types d'états (states) sont disponibles dans Step Functions ?",
        multi: true,
        options: [
          "Task (exécuter une action)",
          "Choice (branchement conditionnel)",
          "Parallel (exécution parallèle de branches)",
          "Wait (attendre un délai)",
          "Map (itérer sur une collection)"
        ],
        answer: [0, 1, 2, 3, 4],
        explanation: "Step Functions offre : <strong>Task</strong> (action), <strong>Choice</strong> (if/else), <strong>Parallel</strong> (branches parallèles), <strong>Wait</strong> (délai), <strong>Map</strong> (boucle), <strong>Pass</strong> (transformation), <strong>Succeed</strong> et <strong>Fail</strong> (terminaison)."
      },
      {
        label: "Question 3",
        text: "Quelle est la différence entre Step Functions Standard et Express ?",
        options: [
          "Il n'y a aucune différence",
          "Standard : workflows longs (jusqu'à 1 an), exactly-once, facturé par transition. Express : workflows courts (jusqu'à 5 min), at-least-once, facturé par exécution et durée",
          "Express est gratuit, Standard est payant",
          "Standard ne supporte pas Lambda, Express si"
        ],
        answer: 1,
        explanation: "<strong>Standard</strong> : jusqu'à 1 an d'exécution, exactly-once, audit complet, facturé par transition d'état. <strong>Express</strong> : jusqu'à 5 minutes, at-least-once (ou at-most-once synchrone), haut débit, facturé par exécution × durée."
      },
      {
        label: "Question 4",
        text: "Qu'est-ce qu'AWS AppSync ?",
        options: [
          "Un service de synchronisation de fichiers",
          "Un service entièrement géré pour créer des API GraphQL avec résolution de données en temps réel (subscriptions WebSocket)",
          "Un outil de déploiement d'applications mobiles",
          "Un service de synchronisation de bases de données"
        ],
        answer: 1,
        explanation: "<strong>AppSync</strong> est un service GraphQL géré qui résout les données depuis DynamoDB, Lambda, RDS, HTTP et OpenSearch. Il supporte les subscriptions en temps réel via WebSocket et le mode offline avec synchronisation automatique."
      },
      {
        label: "Question 5",
        text: "Qu'est-ce que le pattern Saga dans le contexte serverless ?",
        options: [
          "Un pattern de logging avancé",
          "Un pattern de gestion de transactions distribuées où chaque étape a une action compensatrice en cas d'échec",
          "Un pattern de déploiement bleu/vert",
          "Un pattern de monitoring"
        ],
        answer: 1,
        explanation: "Le <strong>pattern Saga</strong> gère les transactions distribuées sans verrou global. Chaque étape a une <strong>action compensatrice</strong> (rollback). Si l'étape 3 échoue, on exécute les compensations des étapes 2 et 1. Step Functions est idéal pour implémenter ce pattern."
      },
      {
        label: "Question 6",
        text: "Qu'est-ce que le pattern CQRS (Command Query Responsibility Segregation) ?",
        options: [
          "Un pattern de chiffrement des données",
          "Un pattern qui sépare les modèles de lecture et d'écriture, optimisant chacun indépendamment",
          "Un pattern de déploiement automatique",
          "Un pattern de gestion des erreurs"
        ],
        answer: 1,
        explanation: "Le <strong>CQRS</strong> sépare le modèle de commande (écriture) du modèle de requête (lecture). En serverless AWS : les écritures passent par Lambda + DynamoDB, les lectures utilisent une vue matérialisée dans ElastiCache ou OpenSearch, synchronisée via DynamoDB Streams."
      },
      {
        label: "Question 7",
        text: "Qu'est-ce qu'un EventBridge Pipe ?",
        options: [
          "Un pipeline CI/CD pour EventBridge",
          "Un mécanisme point-à-point qui connecte une source à une cible avec un enrichissement et un filtrage optionnels, sans écrire de code",
          "Un outil de visualisation des événements",
          "Un service de réplication d'événements"
        ],
        answer: 1,
        explanation: "<strong>EventBridge Pipes</strong> connecte une source (SQS, DynamoDB Streams, Kinesis, etc.) à une cible via un pipeline avec filtrage, enrichissement (Lambda, API Gateway, Step Functions) et transformation — le tout sans code d'orchestration."
      },
      {
        label: "Question 8",
        text: "Comment implémenter un pattern de retry avec backoff exponentiel dans Step Functions ?",
        options: [
          "En ajoutant des sleep() dans les fonctions Lambda",
          "En configurant un bloc Retry dans la définition du Task avec IntervalSeconds, MaxAttempts et BackoffRate",
          "En créant plusieurs instances du même workflow",
          "Ce n'est pas possible avec Step Functions"
        ],
        answer: 1,
        explanation: "Step Functions supporte nativement les <strong>Retry</strong> avec <code>IntervalSeconds</code> (délai initial), <code>MaxAttempts</code> (nombre max de retries) et <code>BackoffRate</code> (multiplicateur du délai). Les <strong>Catch</strong> gèrent les erreurs non récupérables."
      },
      {
        label: "Question 9",
        text: "Qu'est-ce qu'un EventBridge Archive & Replay ?",
        options: [
          "Un service de sauvegarde de base de données",
          "Un mécanisme qui archive les événements et permet de les rejouer ultérieurement pour le debugging, le testing ou le reprocessing",
          "Un service de streaming vidéo",
          "Un outil de versioning des règles"
        ],
        answer: 1,
        explanation: "<strong>Archive & Replay</strong> permet d'archiver les événements dans EventBridge et de les rejouer à la demande. C'est utile pour le debugging (rejouer un événement qui a causé un bug), le testing et le reprocessing après un correctif."
      },
      {
        label: "Question 10",
        text: "Quel service AWS est le plus adapté pour orchestrer un workflow d'approbation humaine (human-in-the-loop) ?",
        options: [
          "Lambda seul",
          "Step Functions avec un Task Token (callback pattern) qui attend l'approbation externe avant de continuer",
          "SQS avec un long polling",
          "API Gateway avec un WebSocket"
        ],
        answer: 1,
        explanation: "Step Functions supporte le <strong>callback pattern</strong> (Task Token) : le workflow génère un token, le transmet à un système externe (email, Slack, UI d'approbation), puis attend que le token soit renvoyé avec un succès ou un échec avant de continuer."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
