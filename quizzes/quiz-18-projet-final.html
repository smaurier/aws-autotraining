<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 18 — Projet final</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 18 — Projet final</h1>
    <p class="subtitle">Architecture review, Well-Architected Framework, piliers</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 12</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Quels sont les 6 piliers du AWS Well-Architected Framework ?",
        multi: true,
        options: [
          "Excellence opérationnelle (Operational Excellence)",
          "Sécurité (Security)",
          "Fiabilité (Reliability)",
          "Efficacité des performances (Performance Efficiency)",
          "Optimisation des coûts (Cost Optimization)",
          "Durabilité (Sustainability)"
        ],
        answer: [0, 1, 2, 3, 4, 5],
        explanation: "Les 6 piliers du Well-Architected Framework sont : <strong>Operational Excellence</strong>, <strong>Security</strong>, <strong>Reliability</strong>, <strong>Performance Efficiency</strong>, <strong>Cost Optimization</strong> et <strong>Sustainability</strong> (ajouté en 2021)."
      },
      {
        label: "Question 2",
        text: "Quel pilier du Well-Architected Framework traite de la capacité à récupérer après une panne et à répondre aux exigences de charge ?",
        options: [
          "Sécurité",
          "Fiabilité (Reliability)",
          "Excellence opérationnelle",
          "Efficacité des performances"
        ],
        answer: 1,
        explanation: "Le pilier <strong>Fiabilité</strong> couvre : la capacité à récupérer après une panne, à scaler dynamiquement, à gérer les erreurs de configuration et les pannes transitoires. Il inclut les concepts de haute disponibilité et de reprise après sinistre."
      },
      {
        label: "Question 3",
        text: "Pour une application web serverless, quelle architecture est recommandée ?",
        options: [
          "EC2 + MySQL sur la même instance",
          "CloudFront + S3 (frontend) + API Gateway + Lambda + DynamoDB (backend)",
          "Un seul serveur dédié avec tout installé",
          "ECS uniquement sans load balancer"
        ],
        answer: 1,
        explanation: "L'architecture serverless typique : <strong>CloudFront + S3</strong> pour le frontend statique, <strong>API Gateway + Lambda</strong> pour l'API, <strong>DynamoDB</strong> pour la persistance. Cette architecture est scalable, résiliente et économique."
      },
      {
        label: "Question 4",
        text: "Qu'est-ce que le principe de « Design for Failure » ?",
        options: [
          "Accepter que l'application va échouer et ne rien faire",
          "Concevoir l'architecture en anticipant que chaque composant peut tomber en panne, avec des mécanismes de résilience (retry, fallback, circuit breaker)",
          "Tester uniquement les scénarios d'échec",
          "Supprimer les composants qui peuvent échouer"
        ],
        answer: 1,
        explanation: "<strong>Design for Failure</strong> signifie concevoir l'architecture en supposant que tout composant peut tomber en panne. Mécanismes : Multi-AZ, Auto Scaling, health checks, retries avec backoff, circuit breakers, DLQ, sauvegardes automatiques."
      },
      {
        label: "Question 5",
        text: "Quelles stratégies de reprise après sinistre (Disaster Recovery) existent sur AWS ?",
        multi: true,
        options: [
          "Backup & Restore (RPO/RTO en heures)",
          "Pilot Light (services critiques minimaux toujours actifs)",
          "Warm Standby (version réduite de l'environnement de production toujours active)",
          "Multi-Site Active/Active (environnement complet dans plusieurs régions)"
        ],
        answer: [0, 1, 2, 3],
        explanation: "Du moins cher au plus résilient : <strong>Backup & Restore</strong> (heures), <strong>Pilot Light</strong> (dizaines de minutes), <strong>Warm Standby</strong> (minutes) et <strong>Multi-Site Active/Active</strong> (quasi-instantané). Le choix dépend du RPO/RTO et du budget."
      },
      {
        label: "Question 6",
        text: "Qu'est-ce que le principe du moindre privilège appliqué à une architecture AWS ?",
        options: [
          "Donner un accès administrateur à une seule personne",
          "Chaque composant (Lambda, EC2, ECS) ne doit avoir que les permissions IAM strictement nécessaires à son fonctionnement",
          "Ne pas utiliser IAM du tout",
          "Utiliser le même rôle IAM pour tous les services"
        ],
        answer: 1,
        explanation: "Chaque service doit avoir un <strong>rôle IAM dédié</strong> avec uniquement les permissions nécessaires. Par exemple, une Lambda qui lit dans DynamoDB ne doit avoir que <code>dynamodb:GetItem</code> et <code>dynamodb:Query</code>, pas un accès complet."
      },
      {
        label: "Question 7",
        text: "Comment optimiser les coûts d'une architecture AWS ?",
        multi: true,
        options: [
          "Utiliser les Reserved Instances ou Savings Plans pour les charges prévisibles",
          "Utiliser les Spot Instances pour les workloads tolérants aux interruptions",
          "Dimensionner correctement les instances (right-sizing) avec AWS Compute Optimizer",
          "Configurer des lifecycle policies S3 pour archiver les données anciennes",
          "Supprimer tous les services de monitoring pour économiser"
        ],
        answer: [0, 1, 2, 3],
        explanation: "L'optimisation des coûts passe par : <strong>Reserved/Savings Plans</strong>, <strong>Spot Instances</strong>, <strong>right-sizing</strong>, <strong>lifecycle policies</strong>, auto-scaling, et services serverless (paiement à l'usage). Ne jamais supprimer le monitoring — il aide à identifier les gaspillages."
      },
      {
        label: "Question 8",
        text: "Qu'est-ce qu'une architecture multi-compte AWS ?",
        options: [
          "Utiliser plusieurs régions dans un même compte",
          "Séparer les environnements (dev, staging, prod) et les domaines (sécurité, réseau, workloads) dans des comptes AWS distincts gérés par Organizations",
          "Créer plusieurs utilisateurs IAM dans le même compte",
          "Utiliser plusieurs fournisseurs cloud"
        ],
        answer: 1,
        explanation: "L'architecture <strong>multi-compte</strong> sépare les environnements et les responsabilités : compte de gestion, comptes de workload (dev/staging/prod), compte de sécurité (logs, audit), compte de réseau (Transit Gateway). AWS Control Tower automatise cette mise en place."
      },
      {
        label: "Question 9",
        text: "Quel outil AWS permet de réaliser un audit d'architecture selon le Well-Architected Framework ?",
        options: [
          "AWS Inspector",
          "AWS Well-Architected Tool",
          "AWS Config",
          "AWS Trusted Advisor"
        ],
        answer: 1,
        explanation: "L'<strong>AWS Well-Architected Tool</strong> guide les équipes à travers un questionnaire structuré basé sur les 6 piliers. Il identifie les risques, propose des recommandations et permet de suivre l'amélioration dans le temps."
      },
      {
        label: "Question 10",
        text: "Qu'est-ce que le pilier Sustainability du Well-Architected Framework ?",
        options: [
          "La rentabilité financière à long terme",
          "La réduction de l'impact environnemental des workloads cloud en optimisant l'utilisation des ressources et en adoptant des pratiques durables",
          "La stabilité technique de l'infrastructure",
          "La durée de vie des instances EC2"
        ],
        answer: 1,
        explanation: "Le pilier <strong>Sustainability</strong> vise à réduire l'empreinte carbone : choisir des régions avec énergie renouvelable, dimensionner correctement les ressources, utiliser des services serverless/managés, optimiser le code et la data transfer."
      },
      {
        label: "Question 11",
        text: "Pour une API avec des pics de trafic imprévisibles, quel pattern d'architecture est recommandé ?",
        options: [
          "EC2 avec un type d'instance fixe très puissant",
          "API Gateway + Lambda + DynamoDB On-Demand — scaling automatique sans provisionnement",
          "Un seul serveur avec un cache Nginx",
          "ECS avec un nombre fixe de conteneurs"
        ],
        answer: 1,
        explanation: "Pour des pics imprévisibles, l'architecture <strong>serverless</strong> (API Gateway + Lambda + DynamoDB On-Demand) est idéale : scaling automatique de 0 à des milliers de requêtes/seconde, sans gestion d'infrastructure et paiement à l'usage."
      },
      {
        label: "Question 12",
        text: "Qu'est-ce qu'AWS Trusted Advisor ?",
        options: [
          "Un service de support technique",
          "Un outil qui inspecte votre environnement AWS et recommande des optimisations dans 5 catégories : coût, performance, sécurité, tolérance aux pannes et limites de service",
          "Un chatbot pour le support AWS",
          "Un outil de déploiement automatique"
        ],
        answer: 1,
        explanation: "<strong>Trusted Advisor</strong> analyse votre compte AWS et fournit des recommandations en temps réel dans 5 catégories : <strong>Cost Optimization</strong>, <strong>Performance</strong>, <strong>Security</strong>, <strong>Fault Tolerance</strong> et <strong>Service Limits</strong>. Les plans Business/Enterprise débloquent tous les checks."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
