<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 06 — API Gateway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 06 — API Gateway</h1>
    <p class="subtitle">Types d'API, ressources, méthodes, stages, throttling, CORS</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 10</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Quels types d'API sont proposés par Amazon API Gateway ?",
        multi: true,
        options: [
          "REST API",
          "HTTP API",
          "WebSocket API",
          "GraphQL API",
          "gRPC API"
        ],
        answer: [0, 1, 2],
        explanation: "API Gateway propose trois types : <strong>REST API</strong> (fonctionnalités complètes), <strong>HTTP API</strong> (plus simple, moins cher, plus rapide) et <strong>WebSocket API</strong> (communication bidirectionnelle en temps réel). GraphQL est géré par AppSync."
      },
      {
        label: "Question 2",
        text: "Quelle est la différence principale entre REST API et HTTP API dans API Gateway ?",
        options: [
          "REST API est gratuit, HTTP API est payant",
          "HTTP API est plus simple, moins cher et plus rapide, mais avec moins de fonctionnalités que REST API",
          "REST API ne supporte pas Lambda comme backend",
          "HTTP API ne supporte pas l'authentification"
        ],
        answer: 1,
        explanation: "<strong>HTTP API</strong> est jusqu'à 70% moins cher et offre de meilleures performances, mais ne supporte pas les plans d'utilisation, les clés API, la mise en cache ou les transformations de requêtes/réponses disponibles avec <strong>REST API</strong>."
      },
      {
        label: "Question 3",
        text: "Qu'est-ce qu'un stage dans API Gateway ?",
        options: [
          "Un type de méthode HTTP",
          "Un environnement de déploiement nommé (dev, staging, prod) de l'API",
          "Un mécanisme de cache",
          "Un type d'autorisation"
        ],
        answer: 1,
        explanation: "Un <strong>stage</strong> est un environnement de déploiement nommé (ex: dev, staging, prod). Chaque stage a sa propre URL d'invocation et peut avoir des configurations différentes (variables de stage, throttling, logs)."
      },
      {
        label: "Question 4",
        text: "Qu'est-ce que le throttling dans API Gateway ?",
        options: [
          "La compression des réponses",
          "La limitation du nombre de requêtes par seconde pour protéger le backend",
          "Le chiffrement du trafic",
          "La mise en cache des réponses"
        ],
        answer: 1,
        explanation: "Le <strong>throttling</strong> limite le débit de requêtes pour protéger le backend. Par défaut, API Gateway limite à 10 000 requêtes/seconde avec un burst de 5 000. Ces limites sont configurables par stage et par méthode."
      },
      {
        label: "Question 5",
        text: "Que signifie CORS et pourquoi est-ce important pour API Gateway ?",
        options: [
          "Cloud Origin Resource Service — un service de stockage",
          "Cross-Origin Resource Sharing — permet aux navigateurs d'appeler l'API depuis un domaine différent",
          "Central Operations Routing System — un mécanisme de routage",
          "Certified Origin Response Standard — un standard de sécurité"
        ],
        answer: 1,
        explanation: "<strong>CORS</strong> (Cross-Origin Resource Sharing) est un mécanisme de sécurité des navigateurs. Si votre frontend (ex: app.example.com) appelle une API sur un domaine différent (api.example.com), il faut configurer les en-têtes CORS sur API Gateway."
      },
      {
        label: "Question 6",
        text: "Quels types d'authorizers sont disponibles dans API Gateway ?",
        multi: true,
        options: [
          "Lambda Authorizer (custom authorizer)",
          "Cognito User Pool Authorizer",
          "IAM Authorization",
          "API Key uniquement"
        ],
        answer: [0, 1, 2],
        explanation: "API Gateway supporte : <strong>Lambda Authorizer</strong> (logique d'autorisation personnalisée), <strong>Cognito User Pool</strong> (vérification de JWT Cognito) et <strong>IAM Authorization</strong> (signature Sigv4). Les API Keys servent au throttling, pas à l'authentification."
      },
      {
        label: "Question 7",
        text: "Qu'est-ce qu'un modèle de mapping (mapping template) dans API Gateway REST API ?",
        options: [
          "Un template CloudFormation pour déployer l'API",
          "Un template VTL (Velocity) qui transforme le format des requêtes/réponses entre le client et le backend",
          "Un fichier de configuration pour le DNS",
          "Un template pour générer de la documentation"
        ],
        answer: 1,
        explanation: "Les <strong>mapping templates</strong> utilisent le langage VTL (Velocity Template Language) pour transformer les données entre le format du client et celui du backend (ex: transformer un body JSON avant de l'envoyer à Lambda)."
      },
      {
        label: "Question 8",
        text: "Quelle est la durée maximale de timeout pour une intégration API Gateway ?",
        options: [
          "15 secondes",
          "29 secondes",
          "60 secondes",
          "5 minutes"
        ],
        answer: 1,
        explanation: "Le timeout d'intégration maximal d'API Gateway est de <strong>29 secondes</strong>. Si le backend (Lambda, HTTP, etc.) ne répond pas dans ce délai, API Gateway retourne une erreur 504. Pour des traitements plus longs, il faut utiliser un pattern asynchrone."
      },
      {
        label: "Question 9",
        text: "Comment configurer un domaine personnalisé pour API Gateway ?",
        multi: true,
        options: [
          "Créer un Custom Domain Name dans API Gateway",
          "Fournir un certificat SSL/TLS via ACM (AWS Certificate Manager)",
          "Créer un enregistrement DNS (CNAME ou A alias) pointant vers le domaine API Gateway",
          "Ouvrir un ticket au support AWS"
        ],
        answer: [0, 1, 2],
        explanation: "Pour un domaine personnalisé : créer un <strong>Custom Domain Name</strong>, fournir un <strong>certificat ACM</strong>, puis configurer un <strong>enregistrement DNS</strong> (alias Route 53 ou CNAME) pointant vers le endpoint API Gateway."
      },
      {
        label: "Question 10",
        text: "Qu'est-ce qu'un plan d'utilisation (Usage Plan) dans API Gateway ?",
        options: [
          "Un plan de tarification pour le client AWS",
          "Un mécanisme permettant de définir des quotas et des limites de throttling par clé API pour des clients tiers",
          "Un plan de déploiement automatique",
          "Un plan de sauvegarde des logs"
        ],
        answer: 1,
        explanation: "Un <strong>Usage Plan</strong> permet de définir des quotas (nombre de requêtes par jour/semaine/mois) et des limites de throttling associés à des <strong>API Keys</strong>. C'est utile pour monétiser une API ou limiter l'usage par client tiers."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
