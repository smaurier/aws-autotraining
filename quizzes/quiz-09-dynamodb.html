<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 07 — DynamoDB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 07 — DynamoDB</h1>
    <p class="subtitle">Clés, GSI, LSI, modes de capacité, Streams, single-table design</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 12</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Quel type de base de données est DynamoDB ?",
        options: [
          "Base de données relationnelle (SQL)",
          "Base de données NoSQL clé-valeur et document",
          "Base de données graphe",
          "Base de données en colonnes (columnar)"
        ],
        answer: 1,
        explanation: "<strong>DynamoDB</strong> est une base de données NoSQL entièrement gérée par AWS, supportant les modèles clé-valeur et document. Elle offre des performances en millisecondes à n'importe quelle échelle."
      },
      {
        label: "Question 2",
        text: "Qu'est-ce qu'une Partition Key (clé de partition) dans DynamoDB ?",
        options: [
          "Un index secondaire",
          "L'attribut principal utilisé pour distribuer les données entre les partitions internes et identifier de manière unique un item (si pas de Sort Key)",
          "Un attribut optionnel pour le tri",
          "Un mécanisme de chiffrement"
        ],
        answer: 1,
        explanation: "La <strong>Partition Key</strong> (ou Hash Key) est utilisée par DynamoDB pour déterminer dans quelle partition physique stocker l'item. Une bonne partition key distribue les données uniformément."
      },
      {
        label: "Question 3",
        text: "Quelle est la différence entre une Partition Key seule et une clé composite (Partition Key + Sort Key) ?",
        options: [
          "Il n'y a aucune différence",
          "Avec une PK seule, chaque item est identifié uniquement par la PK. Avec PK + SK, on peut avoir plusieurs items avec la même PK mais des SK différentes",
          "La Sort Key remplace la Partition Key",
          "La clé composite est réservée aux tables globales"
        ],
        answer: 1,
        explanation: "Avec une <strong>clé composite</strong> (PK + SK), plusieurs items peuvent partager la même Partition Key à condition d'avoir des Sort Keys différentes. La Sort Key permet le tri et les requêtes par plage (range queries) au sein d'une même partition."
      },
      {
        label: "Question 4",
        text: "Qu'est-ce qu'un GSI (Global Secondary Index) ?",
        options: [
          "Un index qui ne peut être créé qu'à la création de la table",
          "Un index avec une Partition Key et une Sort Key optionnelle différentes de la table principale, permettant des patterns de requêtes alternatifs",
          "Un index limité à une seule partition",
          "Un mécanisme de réplication entre régions"
        ],
        answer: 1,
        explanation: "Un <strong>GSI</strong> permet de requêter la table avec une clé de partition différente. Il possède sa propre capacité de lecture/écriture et peut être ajouté/supprimé à tout moment. Les données sont projetées (copiées) dans l'index."
      },
      {
        label: "Question 5",
        text: "Quelle est la différence entre un GSI et un LSI (Local Secondary Index) ?",
        multi: true,
        options: [
          "Un LSI a la même Partition Key que la table mais une Sort Key différente",
          "Un LSI ne peut être créé qu'à la création de la table",
          "Un GSI peut avoir une Partition Key complètement différente",
          "Un GSI peut être ajouté après la création de la table",
          "Un LSI a sa propre capacité provisionnée séparée"
        ],
        answer: [0, 1, 2, 3],
        explanation: "Un <strong>LSI</strong> partage la même PK que la table (même partition), ne peut être créé qu'à la création de la table, et partage la capacité de la table. Un <strong>GSI</strong> peut avoir une PK différente, être ajouté à tout moment, et a sa propre capacité."
      },
      {
        label: "Question 6",
        text: "Quels sont les deux modes de capacité disponibles dans DynamoDB ?",
        options: [
          "Standard et Premium",
          "Provisioned (capacité provisionnée) et On-Demand (à la demande)",
          "Free Tier et Enterprise",
          "Single-region et Multi-region"
        ],
        answer: 1,
        explanation: "DynamoDB propose le mode <strong>Provisioned</strong> (vous définissez les RCU/WCU, avec auto-scaling possible) et le mode <strong>On-Demand</strong> (capacité automatique, paiement par requête, idéal pour les charges imprévisibles)."
      },
      {
        label: "Question 7",
        text: "Que sont les DynamoDB Streams ?",
        options: [
          "Un service de streaming vidéo",
          "Un flux ordonné de modifications (insert, update, delete) sur les items de la table, utilisable comme trigger Lambda",
          "Un outil de migration de données",
          "Un mécanisme de sauvegarde continue"
        ],
        answer: 1,
        explanation: "<strong>DynamoDB Streams</strong> capture un flux ordonné de toutes les modifications (images avant/après) sur une table. Il est couramment utilisé pour déclencher des fonctions Lambda en réaction aux changements (event-driven architecture)."
      },
      {
        label: "Question 8",
        text: "Qu'est-ce que le single-table design en DynamoDB ?",
        options: [
          "Stocker une seule entité par table",
          "Stocker toutes les entités de l'application dans une seule table en utilisant des clés génériques (PK, SK) et des patterns d'accès prédéfinis",
          "Utiliser une seule partition pour toutes les données",
          "Limiter la table à un seul index"
        ],
        answer: 1,
        explanation: "Le <strong>single-table design</strong> consiste à stocker toutes les entités (users, orders, products...) dans une même table avec des clés génériques (PK=USER#123, SK=ORDER#456). Cela permet de récupérer des données liées en une seule requête."
      },
      {
        label: "Question 9",
        text: "Quelle est la taille maximale d'un item DynamoDB ?",
        options: [
          "64 Ko",
          "400 Ko",
          "1 Mo",
          "10 Mo"
        ],
        answer: 1,
        explanation: "La taille maximale d'un item DynamoDB est de <strong>400 Ko</strong> (incluant le nom et la valeur de tous les attributs). Pour des objets plus volumineux, il faut stocker les données dans S3 et garder une référence dans DynamoDB."
      },
      {
        label: "Question 10",
        text: "Qu'est-ce qu'une opération BatchWriteItem ?",
        options: [
          "Une opération qui écrit un seul item avec une transaction",
          "Une opération qui permet d'écrire ou supprimer jusqu'à 25 items en une seule requête API",
          "Une opération qui crée une table",
          "Une opération qui met à jour un index"
        ],
        answer: 1,
        explanation: "<strong>BatchWriteItem</strong> permet d'écrire (Put) ou supprimer (Delete) jusqu'à 25 items en un seul appel API, répartis sur une ou plusieurs tables. Les items qui échouent sont retournés dans UnprocessedItems pour un retry."
      },
      {
        label: "Question 11",
        text: "Qu'est-ce que le TTL (Time To Live) dans DynamoDB ?",
        options: [
          "Le temps de réponse garanti",
          "Un mécanisme qui supprime automatiquement les items expirés en fonction d'un attribut timestamp",
          "La durée de vie d'une connexion à la table",
          "Le temps maximum d'une transaction"
        ],
        answer: 1,
        explanation: "Le <strong>TTL</strong> permet de définir un attribut contenant un timestamp Unix. Les items dont le TTL est passé sont automatiquement supprimés par DynamoDB (sans coût d'écriture). Utile pour les sessions, caches et données temporaires."
      },
      {
        label: "Question 12",
        text: "Qu'est-ce qu'une DynamoDB Transaction ?",
        options: [
          "Un transfert de données entre deux tables",
          "Une opération groupée garantissant que toutes les lectures/écritures réussissent ensemble (ACID) ou aucune",
          "Un mécanisme de facturation",
          "Une sauvegarde transactionnelle"
        ],
        answer: 1,
        explanation: "Les <strong>transactions DynamoDB</strong> (TransactWriteItems / TransactGetItems) garantissent l'atomicité : soit toutes les opérations réussissent, soit aucune n'est appliquée. Jusqu'à 100 items par transaction, sur une ou plusieurs tables."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
