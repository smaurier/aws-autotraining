<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 04 — S3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 04 — S3</h1>
    <p class="subtitle">Classes de stockage, versioning, lifecycle, chiffrement, bucket policies</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 11</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Quelle est la taille maximale d'un objet stocké dans S3 ?",
        options: [
          "1 Go",
          "5 Go",
          "5 To",
          "Illimitée"
        ],
        answer: 2,
        explanation: "La taille maximale d'un objet S3 est de <strong>5 To</strong>. Pour les objets de plus de 5 Go, il faut utiliser le multipart upload."
      },
      {
        label: "Question 2",
        text: "Quelles classes de stockage S3 sont conçues pour les données rarement accédées ?",
        multi: true,
        options: [
          "S3 Standard",
          "S3 Standard-IA (Infrequent Access)",
          "S3 One Zone-IA",
          "S3 Glacier Instant Retrieval",
          "S3 Intelligent-Tiering"
        ],
        answer: [1, 2, 3],
        explanation: "<strong>S3 Standard-IA</strong>, <strong>S3 One Zone-IA</strong> et <strong>S3 Glacier Instant Retrieval</strong> sont conçus pour les données rarement accédées. Standard est pour les accès fréquents, et Intelligent-Tiering déplace automatiquement les données entre niveaux."
      },
      {
        label: "Question 3",
        text: "Qu'apporte le versioning S3 ?",
        options: [
          "Il compresse automatiquement les fichiers",
          "Il conserve toutes les versions d'un objet, permettant la récupération en cas de suppression ou d'écrasement",
          "Il chiffre automatiquement les objets",
          "Il réplique les objets dans une autre région"
        ],
        answer: 1,
        explanation: "Le <strong>versioning S3</strong> conserve toutes les versions précédentes d'un objet. En cas de suppression, un « delete marker » est ajouté et les versions précédentes restent récupérables."
      },
      {
        label: "Question 4",
        text: "Quelle est la différence entre S3 Glacier et S3 Glacier Deep Archive ?",
        options: [
          "Glacier est moins cher que Deep Archive",
          "Deep Archive a un temps de récupération plus long (jusqu'à 12h) mais un coût de stockage inférieur",
          "Deep Archive ne supporte pas le chiffrement",
          "Glacier est limité à 1 To par objet"
        ],
        answer: 1,
        explanation: "<strong>S3 Glacier Deep Archive</strong> est la classe la moins chère mais avec un temps de récupération de 12 à 48 heures. <strong>S3 Glacier Flexible Retrieval</strong> permet une récupération en quelques minutes à quelques heures."
      },
      {
        label: "Question 5",
        text: "Qu'est-ce qu'une lifecycle rule (règle de cycle de vie) S3 ?",
        options: [
          "Une règle qui définit les permissions d'accès au bucket",
          "Une règle qui déplace automatiquement les objets entre classes de stockage ou les supprime après un délai",
          "Une règle qui déclenche une fonction Lambda à chaque upload",
          "Une règle qui limite la taille des objets uploadés"
        ],
        answer: 1,
        explanation: "Les <strong>lifecycle rules</strong> permettent de transitionner automatiquement les objets vers des classes moins chères (ex : Standard → IA après 30 jours → Glacier après 90 jours) ou de les supprimer après un certain délai."
      },
      {
        label: "Question 6",
        text: "Quels types de chiffrement S3 côté serveur (SSE) sont disponibles ?",
        multi: true,
        options: [
          "SSE-S3 (clés gérées par Amazon S3)",
          "SSE-KMS (clés gérées par AWS KMS)",
          "SSE-C (clés fournies par le client)",
          "SSE-IAM (clés gérées par IAM)"
        ],
        answer: [0, 1, 2],
        explanation: "S3 propose trois types de chiffrement côté serveur : <strong>SSE-S3</strong> (clés gérées par S3), <strong>SSE-KMS</strong> (clés gérées par AWS KMS avec audit) et <strong>SSE-C</strong> (clés fournies par le client). SSE-IAM n'existe pas."
      },
      {
        label: "Question 7",
        text: "Les noms de buckets S3 doivent être uniques à quel niveau ?",
        options: [
          "Au niveau du compte AWS",
          "Au niveau de la région",
          "Au niveau mondial (globalement unique)",
          "Au niveau du VPC"
        ],
        answer: 2,
        explanation: "Les noms de buckets S3 doivent être <strong>globalement uniques</strong> à travers tous les comptes AWS et toutes les régions du monde."
      },
      {
        label: "Question 8",
        text: "Qu'est-ce qu'une bucket policy S3 ?",
        options: [
          "Une politique IAM attachée à un utilisateur pour accéder à S3",
          "Une politique JSON attachée directement au bucket définissant qui peut accéder aux objets et comment",
          "Un fichier de configuration stocké dans le bucket",
          "Un mécanisme de réplication entre buckets"
        ],
        answer: 1,
        explanation: "Une <strong>bucket policy</strong> est une politique basée sur les ressources (resource-based policy) au format JSON attachée au bucket. Elle définit les permissions d'accès (Allow/Deny) pour des principals spécifiques."
      },
      {
        label: "Question 9",
        text: "Quelle fonctionnalité S3 permet de générer une URL temporaire donnant accès à un objet privé ?",
        options: [
          "S3 Transfer Acceleration",
          "Pre-signed URL (URL pré-signée)",
          "S3 Access Points",
          "S3 Object Lock"
        ],
        answer: 1,
        explanation: "Les <strong>pre-signed URLs</strong> permettent de générer une URL temporaire (avec expiration) donnant accès en lecture ou écriture à un objet S3 privé, sans nécessiter de credentials AWS pour l'appelant."
      },
      {
        label: "Question 10",
        text: "Quel est le modèle de cohérence de S3 depuis décembre 2020 ?",
        options: [
          "Cohérence éventuelle pour toutes les opérations",
          "Cohérence forte (strong consistency) pour les PUT et DELETE après la première écriture",
          "Cohérence forte pour toutes les opérations de lecture après écriture (read-after-write)",
          "Pas de garantie de cohérence"
        ],
        answer: 2,
        explanation: "Depuis décembre 2020, S3 offre une <strong>cohérence forte (strong read-after-write consistency)</strong> pour toutes les opérations : PUT, DELETE, et LIST. Une lecture après écriture retourne toujours la dernière version."
      },
      {
        label: "Question 11",
        text: "Qu'est-ce que S3 Object Lock ?",
        options: [
          "Un mécanisme pour chiffrer les objets",
          "Un mécanisme WORM (Write Once Read Many) empêchant la suppression ou la modification d'objets pendant une période définie",
          "Un verrou empêchant les uploads simultanés",
          "Un mécanisme de verrouillage des buckets publics"
        ],
        answer: 1,
        explanation: "<strong>S3 Object Lock</strong> permet d'appliquer un modèle WORM (Write Once Read Many) pour empêcher la suppression ou l'écrasement d'objets pendant une période de rétention définie. Utile pour la conformité réglementaire."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
