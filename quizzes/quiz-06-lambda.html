<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 05 — Lambda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 05 — Lambda</h1>
    <p class="subtitle">Modèle d'exécution, cold start, concurrence, layers, triggers</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 11</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Quelle est la durée maximale d'exécution d'une fonction AWS Lambda ?",
        options: [
          "5 minutes",
          "15 minutes",
          "30 minutes",
          "1 heure"
        ],
        answer: 1,
        explanation: "La durée maximale d'exécution d'une fonction Lambda est de <strong>15 minutes</strong> (900 secondes). Au-delà, il faut envisager des alternatives comme Step Functions ou ECS."
      },
      {
        label: "Question 2",
        text: "Qu'est-ce qu'un cold start en Lambda ?",
        options: [
          "Un redémarrage du serveur AWS",
          "Le temps d'initialisation de l'environnement d'exécution lors de la première invocation ou après une période d'inactivité",
          "Une erreur de timeout",
          "Un arrêt forcé de la fonction par AWS"
        ],
        answer: 1,
        explanation: "Un <strong>cold start</strong> survient quand AWS doit provisionner un nouvel environnement d'exécution : télécharger le code, démarrer le runtime, exécuter le code d'initialisation. Les invocations suivantes réutilisent l'environnement (warm start)."
      },
      {
        label: "Question 3",
        text: "Quels services peuvent déclencher (trigger) une fonction Lambda ?",
        multi: true,
        options: [
          "API Gateway",
          "S3 (événements sur les objets)",
          "DynamoDB Streams",
          "SQS (messages dans une file)",
          "CloudWatch Events / EventBridge"
        ],
        answer: [0, 1, 2, 3, 4],
        explanation: "Lambda peut être déclenchée par de très nombreux services AWS : <strong>API Gateway</strong>, <strong>S3</strong>, <strong>DynamoDB Streams</strong>, <strong>SQS</strong>, <strong>EventBridge</strong>, SNS, Kinesis, CloudWatch Logs, Cognito, etc."
      },
      {
        label: "Question 4",
        text: "Qu'est-ce qu'une Lambda Layer ?",
        options: [
          "Une couche réseau additionnelle pour Lambda",
          "Un package de code ou de dépendances réutilisable partageable entre plusieurs fonctions Lambda",
          "Un niveau de permission IAM pour Lambda",
          "Un mécanisme de versioning des fonctions"
        ],
        answer: 1,
        explanation: "Une <strong>Lambda Layer</strong> est un archive ZIP contenant du code, des bibliothèques ou des données que l'on peut partager entre plusieurs fonctions. Cela réduit la taille du package de déploiement et facilite la gestion des dépendances."
      },
      {
        label: "Question 5",
        text: "Quelle est la quantité maximale de mémoire configurable pour une fonction Lambda ?",
        options: [
          "512 Mo",
          "3 Go",
          "10 Go",
          "16 Go"
        ],
        answer: 2,
        explanation: "La mémoire configurable va de 128 Mo à <strong>10 240 Mo (10 Go)</strong>. Le CPU alloué est proportionnel à la mémoire configurée."
      },
      {
        label: "Question 6",
        text: "Qu'est-ce que la concurrence provisionnée (Provisioned Concurrency) ?",
        options: [
          "Le nombre maximum d'erreurs autorisées",
          "Un mécanisme qui garde des environnements d'exécution pré-initialisés pour éliminer les cold starts",
          "Le nombre de régions dans lesquelles la fonction est déployée",
          "La limite de requêtes par seconde sur API Gateway"
        ],
        answer: 1,
        explanation: "La <strong>Provisioned Concurrency</strong> maintient un nombre défini d'environnements d'exécution pré-initialisés (« warm ») en permanence, éliminant les cold starts pour ces invocations. C'est facturé en continu."
      },
      {
        label: "Question 7",
        text: "Quel est le modèle de tarification de Lambda ?",
        multi: true,
        options: [
          "Nombre de requêtes (invocations)",
          "Durée d'exécution × mémoire allouée (GB-secondes)",
          "Abonnement mensuel fixe",
          "Trafic réseau sortant"
        ],
        answer: [0, 1],
        explanation: "Lambda est facturé sur deux axes : le <strong>nombre de requêtes</strong> (0,20 $ par million) et la <strong>durée × mémoire</strong> (GB-secondes). Le Free Tier inclut 1 million de requêtes et 400 000 GB-secondes par mois."
      },
      {
        label: "Question 8",
        text: "Comment une fonction Lambda accède-t-elle aux variables d'environnement ?",
        options: [
          "Via un fichier .env dans le package de déploiement",
          "Via les variables d'environnement système (process.env en Node.js, os.environ en Python)",
          "Via un appel API à AWS Secrets Manager obligatoirement",
          "Les variables d'environnement ne sont pas supportées"
        ],
        answer: 1,
        explanation: "Les variables d'environnement Lambda sont accessibles via les mécanismes standard du runtime : <code>process.env.MA_VARIABLE</code> en Node.js ou <code>os.environ['MA_VARIABLE']</code> en Python. Elles peuvent être chiffrées avec KMS."
      },
      {
        label: "Question 9",
        text: "Quelle est la taille maximale du package de déploiement Lambda (ZIP compressé) ?",
        options: [
          "10 Mo",
          "50 Mo (ZIP), 250 Mo (décompressé)",
          "500 Mo",
          "1 Go"
        ],
        answer: 1,
        explanation: "Le package ZIP ne peut pas dépasser <strong>50 Mo</strong> en upload direct (250 Mo décompressé). Pour des packages plus grands, on peut utiliser des container images Lambda (jusqu'à 10 Go)."
      },
      {
        label: "Question 10",
        text: "Comment réduire les cold starts d'une fonction Lambda ?",
        multi: true,
        options: [
          "Utiliser la Provisioned Concurrency",
          "Réduire la taille du package de déploiement",
          "Augmenter la mémoire allouée",
          "Utiliser SnapStart (Java)",
          "Augmenter le timeout de la fonction"
        ],
        answer: [0, 1, 2, 3],
        explanation: "Pour réduire les cold starts : <strong>Provisioned Concurrency</strong>, <strong>réduire la taille du package</strong>, <strong>augmenter la mémoire</strong> (plus de CPU pour l'initialisation) et <strong>SnapStart</strong> (Java uniquement, snapshot de l'environnement initialisé). Le timeout n'a pas d'impact sur le cold start."
      },
      {
        label: "Question 11",
        text: "Qu'est-ce que le modèle d'invocation asynchrone de Lambda ?",
        options: [
          "Lambda attend la réponse du service appelant",
          "Lambda place l'événement dans une file interne, retourne immédiatement un 202 et traite l'événement de manière asynchrone",
          "Lambda exécute la fonction dans un autre compte AWS",
          "Lambda planifie l'exécution pour plus tard via un cron"
        ],
        answer: 1,
        explanation: "En <strong>invocation asynchrone</strong>, l'événement est placé dans une file interne de Lambda. Le service appelant reçoit un 202 immédiatement. Lambda gère les retries (2 tentatives par défaut) et peut envoyer les échecs vers une DLQ ou une destination."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
