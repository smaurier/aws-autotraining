<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 17 — CI/CD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 17 — CI/CD</h1>
    <p class="subtitle">CodePipeline, CodeBuild, GitHub Actions, stratégies de déploiement</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 11</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Que signifie CI/CD ?",
        options: [
          "Cloud Infrastructure / Cloud Deployment",
          "Continuous Integration / Continuous Delivery (ou Deployment)",
          "Container Integration / Container Delivery",
          "Code Inspection / Code Distribution"
        ],
        answer: 1,
        explanation: "<strong>CI</strong> (Continuous Integration) : intégrer et tester le code automatiquement à chaque commit. <strong>CD</strong> (Continuous Delivery/Deployment) : livrer automatiquement les artefacts testés vers les environnements cibles."
      },
      {
        label: "Question 2",
        text: "Qu'est-ce qu'AWS CodePipeline ?",
        options: [
          "Un IDE cloud",
          "Un service d'orchestration de pipeline CI/CD qui automatise les étapes de build, test et déploiement",
          "Un service de stockage de code source",
          "Un outil de monitoring"
        ],
        answer: 1,
        explanation: "<strong>CodePipeline</strong> orchestre le flux complet CI/CD : source (GitHub, CodeCommit, S3) → build (CodeBuild) → test → approbation → déploiement (CodeDeploy, ECS, Lambda, CloudFormation, etc.)."
      },
      {
        label: "Question 3",
        text: "Qu'est-ce qu'AWS CodeBuild ?",
        options: [
          "Un outil de gestion de code source",
          "Un service de build entièrement géré qui compile le code, exécute les tests et produit les artefacts de déploiement",
          "Un service de déploiement",
          "Un outil de scan de sécurité"
        ],
        answer: 1,
        explanation: "<strong>CodeBuild</strong> est un service de build serverless. Il utilise un fichier <code>buildspec.yml</code> pour définir les phases (install, pre_build, build, post_build). Il supporte Docker, npm, Maven, pip et d'autres outils."
      },
      {
        label: "Question 4",
        text: "Comment GitHub Actions peut-il déployer sur AWS de manière sécurisée ?",
        options: [
          "En stockant les access keys dans le code source",
          "En utilisant OIDC (OpenID Connect) pour assumer un rôle IAM avec des credentials temporaires, sans stocker de secrets",
          "En partageant le compte root AWS",
          "GitHub Actions ne peut pas déployer sur AWS"
        ],
        answer: 1,
        explanation: "La meilleure pratique est d'utiliser <strong>OIDC</strong> : GitHub Actions obtient un token OIDC, l'échange contre des credentials AWS temporaires via STS AssumeRoleWithWebIdentity. Pas de secrets à stocker ni à rotater."
      },
      {
        label: "Question 5",
        text: "Qu'est-ce que le déploiement bleu/vert (blue/green) ?",
        options: [
          "Un déploiement dans deux régions AWS",
          "Un déploiement où deux environnements identiques coexistent : le vert (actif) reçoit le trafic, le bleu (nouveau) est prêt. Le basculement est instantané",
          "Un déploiement avec deux branches git",
          "Un déploiement qui alterne entre deux comptes AWS"
        ],
        answer: 1,
        explanation: "Le <strong>déploiement bleu/vert</strong> maintient deux environnements identiques. Le nouveau code est déployé sur l'environnement inactif, testé, puis le trafic est basculé instantanément. Le rollback est immédiat en rebasculant."
      },
      {
        label: "Question 6",
        text: "Qu'est-ce que le déploiement canary ?",
        options: [
          "Un déploiement réservé aux environnements de test",
          "Un déploiement progressif qui dirige un petit pourcentage du trafic (ex: 5%) vers la nouvelle version, puis augmente graduellement si les métriques sont saines",
          "Un déploiement qui utilise un oiseau canari pour tester",
          "Un déploiement qui se fait uniquement la nuit"
        ],
        answer: 1,
        explanation: "Le <strong>déploiement canary</strong> route un petit pourcentage du trafic vers la nouvelle version. Si les métriques (erreurs, latence) sont bonnes, le pourcentage augmente progressivement jusqu'à 100%. AWS CodeDeploy et Lambda supportent ce pattern nativement."
      },
      {
        label: "Question 7",
        text: "Quel fichier définit les étapes de build dans CodeBuild ?",
        options: [
          "Dockerfile",
          "buildspec.yml",
          "pipeline.json",
          "deploy.yml"
        ],
        answer: 1,
        explanation: "Le fichier <strong>buildspec.yml</strong> à la racine du repository définit les phases de build (install, pre_build, build, post_build), les variables d'environnement, les artefacts de sortie et les rapports de test."
      },
      {
        label: "Question 8",
        text: "Quelles stratégies de déploiement Lambda sont supportées par CodeDeploy ?",
        multi: true,
        options: [
          "Canary (ex: 10% pendant 5 minutes puis 100%)",
          "Linear (ex: 10% toutes les 2 minutes)",
          "All-at-once (tout le trafic immédiatement)",
          "Rolling update"
        ],
        answer: [0, 1, 2],
        explanation: "CodeDeploy supporte pour Lambda : <strong>Canary</strong> (X% puis 100%), <strong>Linear</strong> (X% toutes les N minutes) et <strong>All-at-once</strong> (bascule immédiate). Le rolling update est un concept EC2/ECS, pas Lambda."
      },
      {
        label: "Question 9",
        text: "Qu'est-ce qu'une étape d'approbation manuelle dans CodePipeline ?",
        options: [
          "Un test automatique qui vérifie la qualité du code",
          "Une étape qui suspend le pipeline et attend qu'un utilisateur autorisé approuve manuellement avant de continuer",
          "Un système de vote entre développeurs",
          "Une notification Slack automatique"
        ],
        answer: 1,
        explanation: "L'<strong>approbation manuelle</strong> suspend le pipeline et envoie une notification (SNS). Un utilisateur IAM autorisé doit approuver (ou rejeter) pour que le pipeline continue. Utile avant un déploiement en production."
      },
      {
        label: "Question 10",
        text: "Comment stocker les artefacts de build entre les étapes d'un CodePipeline ?",
        options: [
          "Dans une base de données RDS",
          "Dans un bucket S3 dédié au pipeline (artifact store)",
          "Dans le cache du navigateur",
          "Les artefacts ne peuvent pas être partagés entre étapes"
        ],
        answer: 1,
        explanation: "CodePipeline stocke les artefacts dans un <strong>bucket S3</strong> (artifact store) automatiquement créé ou spécifié. Chaque étape du pipeline peut produire et consommer des artefacts via ce bucket."
      },
      {
        label: "Question 11",
        text: "Quelle est la différence entre Continuous Delivery et Continuous Deployment ?",
        options: [
          "Il n'y a aucune différence",
          "Continuous Delivery déploie automatiquement jusqu'en staging avec approbation manuelle pour la prod. Continuous Deployment déploie automatiquement en production sans intervention humaine",
          "Continuous Deployment est moins fiable que Continuous Delivery",
          "Continuous Delivery ne fait pas de tests automatiques"
        ],
        answer: 1,
        explanation: "<strong>Continuous Delivery</strong> : le code est toujours prêt à être déployé en production, mais le déploiement nécessite une approbation manuelle. <strong>Continuous Deployment</strong> : le déploiement en production est entièrement automatique après les tests."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
