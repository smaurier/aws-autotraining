<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 14 — RDS & ElastiCache</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 14 — RDS & ElastiCache</h1>
    <p class="subtitle">Moteurs RDS, Multi-AZ, read replicas, ElastiCache Redis vs Memcached</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 11</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Quels moteurs de base de données sont supportés par Amazon RDS ?",
        multi: true,
        options: [
          "MySQL",
          "PostgreSQL",
          "Oracle",
          "Microsoft SQL Server",
          "MongoDB"
        ],
        answer: [0, 1, 2, 3],
        explanation: "RDS supporte : <strong>MySQL</strong>, <strong>PostgreSQL</strong>, <strong>MariaDB</strong>, <strong>Oracle</strong>, <strong>SQL Server</strong> et <strong>Amazon Aurora</strong>. MongoDB n'est pas supporté par RDS (utiliser DocumentDB ou MongoDB Atlas)."
      },
      {
        label: "Question 2",
        text: "Qu'est-ce que le Multi-AZ dans RDS ?",
        options: [
          "Le déploiement de la base dans plusieurs régions",
          "Un mécanisme de haute disponibilité qui maintient une réplique synchrone dans une autre AZ avec failover automatique",
          "La possibilité de lire les données depuis plusieurs AZ",
          "Un mécanisme de scaling horizontal"
        ],
        answer: 1,
        explanation: "<strong>Multi-AZ</strong> maintient une réplique synchrone (standby) dans une autre Zone de disponibilité. En cas de panne de l'instance primaire, le failover est automatique (60-120 secondes). Le standby n'est pas accessible en lecture."
      },
      {
        label: "Question 3",
        text: "Quelle est la différence entre Multi-AZ et les Read Replicas ?",
        options: [
          "Il n'y a aucune différence",
          "Multi-AZ est pour la haute disponibilité (failover), les Read Replicas sont pour la scalabilité en lecture",
          "Les Read Replicas sont synchrones, Multi-AZ est asynchrone",
          "Multi-AZ est plus cher que les Read Replicas dans tous les cas"
        ],
        answer: 1,
        explanation: "<strong>Multi-AZ</strong> : haute disponibilité, réplication synchrone, failover automatique, standby non lisible. <strong>Read Replicas</strong> : scalabilité en lecture, réplication asynchrone, accessibles en lecture, peuvent être dans une autre région."
      },
      {
        label: "Question 4",
        text: "Qu'est-ce qu'Amazon Aurora ?",
        options: [
          "Un service de base de données NoSQL",
          "Un moteur de base de données relationnelle cloud-native compatible MySQL et PostgreSQL, jusqu'à 5x plus rapide que MySQL et 3x que PostgreSQL",
          "Un outil de migration de bases de données",
          "Un service de data warehouse"
        ],
        answer: 1,
        explanation: "<strong>Aurora</strong> est un moteur relationnel cloud-native avec un stockage distribué auto-scalant (jusqu'à 128 To), 6 copies sur 3 AZ, failover < 30s et compatibilité MySQL/PostgreSQL. Aurora Serverless v2 offre un scaling automatique."
      },
      {
        label: "Question 5",
        text: "Combien de Read Replicas peut-on créer maximum pour une instance RDS MySQL ?",
        options: [
          "3",
          "5",
          "15",
          "Illimité"
        ],
        answer: 1,
        explanation: "RDS MySQL et PostgreSQL supportent jusqu'à <strong>5 Read Replicas</strong>. Aurora supporte jusqu'à <strong>15 Read Replicas</strong> avec un lag de réplication sub-10ms grâce à son stockage partagé."
      },
      {
        label: "Question 6",
        text: "Quelle est la différence entre ElastiCache Redis et ElastiCache Memcached ?",
        multi: true,
        options: [
          "Redis supporte la persistance des données, Memcached non",
          "Redis supporte les structures de données complexes (lists, sets, sorted sets, hashes)",
          "Redis supporte la réplication (Multi-AZ) et le clustering, Memcached supporte le sharding multi-thread",
          "Memcached supporte les transactions, Redis non",
          "Redis supporte le pub/sub, Memcached non"
        ],
        answer: [0, 1, 2, 4],
        explanation: "<strong>Redis</strong> : persistance, structures riches, réplication, clustering, pub/sub, Lua scripting. <strong>Memcached</strong> : cache simple, multi-thread, pas de persistance, pas de réplication. Redis est le choix par défaut pour la plupart des use cases."
      },
      {
        label: "Question 7",
        text: "Quels patterns de mise en cache sont couramment utilisés avec ElastiCache ?",
        multi: true,
        options: [
          "Cache-Aside (Lazy Loading) — lire du cache, si miss, lire de la DB et mettre en cache",
          "Write-Through — écrire en cache à chaque écriture en DB",
          "Write-Behind (Write-Back) — écrire en cache d'abord, puis en DB de manière asynchrone",
          "Cache-First — le cache est la seule source de données"
        ],
        answer: [0, 1, 2],
        explanation: "Les trois patterns principaux sont : <strong>Cache-Aside</strong> (le plus courant, données chargées à la demande), <strong>Write-Through</strong> (cohérence forte, latence d'écriture plus élevée) et <strong>Write-Behind</strong> (meilleures performances d'écriture, risque de perte de données)."
      },
      {
        label: "Question 8",
        text: "Qu'est-ce que RDS Proxy ?",
        options: [
          "Un reverse proxy nginx pour RDS",
          "Un proxy de base de données entièrement géré qui pool les connexions, améliore la disponibilité et s'intègre avec IAM/Secrets Manager",
          "Un outil de migration de données",
          "Un service de monitoring RDS"
        ],
        answer: 1,
        explanation: "<strong>RDS Proxy</strong> gère un pool de connexions vers la base, réduisant le stress sur l'instance RDS. Il est particulièrement utile avec Lambda (nombreuses connexions courtes) et améliore le temps de failover de 66% en Multi-AZ."
      },
      {
        label: "Question 9",
        text: "Qu'est-ce qu'Aurora Serverless v2 ?",
        options: [
          "Un service Aurora sans base de données",
          "Un mode de déploiement Aurora qui scale automatiquement la capacité (ACU) en fonction de la charge, à la fraction d'ACU près",
          "Un service Lambda spécialisé pour les bases de données",
          "Un outil de test de bases de données"
        ],
        answer: 1,
        explanation: "<strong>Aurora Serverless v2</strong> ajuste automatiquement la capacité (en Aurora Capacity Units — ACU) de manière granulaire (0.5 ACU) et quasi instantanée. Idéal pour les charges variables ou imprévisibles."
      },
      {
        label: "Question 10",
        text: "Comment RDS gère-t-il les sauvegardes automatiques ?",
        options: [
          "RDS ne propose pas de sauvegardes automatiques",
          "RDS effectue des snapshots automatiques quotidiens avec rétention configurable (0-35 jours) et des transaction logs toutes les 5 minutes (point-in-time recovery)",
          "Les sauvegardes doivent être configurées manuellement",
          "RDS sauvegarde uniquement la structure, pas les données"
        ],
        answer: 1,
        explanation: "RDS effectue des <strong>snapshots automatiques</strong> quotidiens (pendant la fenêtre de maintenance) et sauvegarde les <strong>transaction logs</strong> toutes les 5 minutes. Cela permet le <strong>Point-in-Time Recovery</strong> (restauration à n'importe quel moment dans la période de rétention)."
      },
      {
        label: "Question 11",
        text: "Dans quel scénario utiliser ElastiCache plutôt qu'une Read Replica ?",
        options: [
          "Quand on veut stocker des données relationnelles complexes",
          "Quand on a besoin de temps de réponse en sub-milliseconde pour des données fréquemment accédées (sessions, classements, données de référence)",
          "Quand on veut sauvegarder des données de manière permanente",
          "Quand on a besoin de transactions ACID"
        ],
        answer: 1,
        explanation: "<strong>ElastiCache</strong> est idéal pour les données fréquemment lues nécessitant des temps de réponse <strong>sub-milliseconde</strong> : sessions utilisateur, compteurs, classements, résultats de requêtes coûteuses. Les Read Replicas offrent des temps de réponse en millisecondes."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
