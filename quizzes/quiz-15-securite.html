<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 15 — Sécurité</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 15 — Sécurité</h1>
    <p class="subtitle">KMS, WAF, Shield, GuardDuty, Security Hub, Organizations</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 11</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Qu'est-ce qu'AWS KMS (Key Management Service) ?",
        options: [
          "Un service de gestion des mots de passe",
          "Un service de gestion des clés de chiffrement permettant de créer, gérer et contrôler les clés cryptographiques",
          "Un service de monitoring réseau",
          "Un outil de déploiement d'applications"
        ],
        answer: 1,
        explanation: "<strong>AWS KMS</strong> permet de créer et gérer des clés de chiffrement (CMK — Customer Master Keys) utilisées pour chiffrer les données dans les services AWS (S3, EBS, RDS, etc.). Il offre un contrôle fin via les key policies et un audit via CloudTrail."
      },
      {
        label: "Question 2",
        text: "Quelle est la différence entre AWS Shield Standard et AWS Shield Advanced ?",
        options: [
          "Il n'y a aucune différence",
          "Shield Standard est gratuit et protège contre les attaques DDoS courantes. Shield Advanced est payant et offre une protection renforcée, un support 24/7 et une protection financière",
          "Shield Standard protège uniquement EC2, Shield Advanced protège tous les services",
          "Shield Advanced est gratuit pour les comptes Enterprise"
        ],
        answer: 1,
        explanation: "<strong>Shield Standard</strong> : gratuit, protection automatique contre les attaques DDoS L3/L4 courantes. <strong>Shield Advanced</strong> : ~3000 $/mois, protection avancée L3/L4/L7, équipe DRT (DDoS Response Team), protection des coûts en cas d'attaque."
      },
      {
        label: "Question 3",
        text: "Qu'est-ce qu'AWS WAF (Web Application Firewall) ?",
        options: [
          "Un firewall réseau de niveau 3/4",
          "Un pare-feu applicatif de niveau 7 qui protège les applications web contre les attaques courantes (SQL injection, XSS, etc.)",
          "Un service de VPN",
          "Un outil de scan de vulnérabilités"
        ],
        answer: 1,
        explanation: "<strong>AWS WAF</strong> est un pare-feu applicatif Layer 7 qui filtre le trafic HTTP/HTTPS. Il s'intègre avec CloudFront, ALB et API Gateway. Il utilise des règles (rate limiting, IP blocking, pattern matching) et des Managed Rule Groups."
      },
      {
        label: "Question 4",
        text: "Qu'est-ce qu'Amazon GuardDuty ?",
        options: [
          "Un agent antivirus pour EC2",
          "Un service de détection de menaces intelligent qui analyse les logs AWS (CloudTrail, VPC Flow Logs, DNS) pour identifier les activités suspectes",
          "Un service de sauvegarde sécurisée",
          "Un outil de gestion des certificats"
        ],
        answer: 1,
        explanation: "<strong>GuardDuty</strong> est un service de détection de menaces qui utilise le machine learning pour analyser les CloudTrail Logs, VPC Flow Logs et DNS Logs. Il détecte les accès non autorisés, les instances compromises, les comportements anormaux, etc."
      },
      {
        label: "Question 5",
        text: "Qu'est-ce qu'AWS Security Hub ?",
        options: [
          "Un VPN sécurisé",
          "Un service central qui agrège les findings de sécurité de GuardDuty, Inspector, Macie, etc. et vérifie la conformité aux standards (CIS, PCI DSS)",
          "Un outil de chiffrement de données",
          "Un service de rotation des clés"
        ],
        answer: 1,
        explanation: "<strong>Security Hub</strong> centralise et priorise les alertes de sécurité provenant de multiples services AWS. Il vérifie automatiquement la conformité aux standards de sécurité (AWS Foundational Security Best Practices, CIS, PCI DSS)."
      },
      {
        label: "Question 6",
        text: "Qu'est-ce qu'AWS Organizations ?",
        options: [
          "Un outil de gestion de projet",
          "Un service permettant de gérer de manière centralisée plusieurs comptes AWS avec des politiques de contrôle de service (SCP)",
          "Un service de facturation uniquement",
          "Un annuaire d'employés"
        ],
        answer: 1,
        explanation: "<strong>AWS Organizations</strong> permet de créer et gérer une hiérarchie de comptes AWS. Les <strong>SCP</strong> (Service Control Policies) limitent les permissions au niveau de l'organisation ou de l'OU, offrant une gouvernance centralisée."
      },
      {
        label: "Question 7",
        text: "Quels services AWS permettent de stocker des secrets de manière sécurisée ?",
        multi: true,
        options: [
          "AWS Secrets Manager (rotation automatique, intégration RDS)",
          "AWS Systems Manager Parameter Store (SecureString avec KMS)",
          "Variables d'environnement Lambda (chiffrées avec KMS)",
          "Fichier .env dans un bucket S3 public"
        ],
        answer: [0, 1, 2],
        explanation: "<strong>Secrets Manager</strong> gère la rotation automatique des secrets (mots de passe RDS, clés API). <strong>Parameter Store</strong> stocke des valeurs chiffrées avec KMS. Les variables Lambda peuvent être chiffrées. Un fichier .env dans un bucket public est une faille de sécurité."
      },
      {
        label: "Question 8",
        text: "Qu'est-ce qu'une SCP (Service Control Policy) dans AWS Organizations ?",
        options: [
          "Une politique IAM classique",
          "Une politique qui définit les permissions maximales pour les comptes au sein de l'organisation, agissant comme un guardrail",
          "Un script de configuration de services",
          "Une politique de chiffrement"
        ],
        answer: 1,
        explanation: "Les <strong>SCP</strong> définissent les limites maximales de permissions pour les comptes d'une Organisation ou d'une OU. Elles ne donnent pas de permissions — elles restreignent ce qui est possible. Une SCP s'applique à tous les utilisateurs et rôles du compte, y compris le root."
      },
      {
        label: "Question 9",
        text: "Qu'est-ce qu'Amazon Inspector ?",
        options: [
          "Un outil de debugging d'applications",
          "Un service d'évaluation automatisée de la sécurité qui scanne les instances EC2, les images ECR et les fonctions Lambda pour détecter les vulnérabilités",
          "Un service de monitoring de performances",
          "Un outil d'inspection du réseau"
        ],
        answer: 1,
        explanation: "<strong>Amazon Inspector</strong> scanne automatiquement les instances EC2, les images de conteneurs ECR et les fonctions Lambda pour détecter les vulnérabilités logicielles (CVE) et les expositions réseau non intentionnelles."
      },
      {
        label: "Question 10",
        text: "Qu'est-ce qu'AWS CloudTrail ?",
        options: [
          "Un outil de traçage applicatif",
          "Un service qui enregistre toutes les actions API effectuées dans un compte AWS pour l'audit et la conformité",
          "Un service de déploiement",
          "Un outil de visualisation réseau"
        ],
        answer: 1,
        explanation: "<strong>CloudTrail</strong> enregistre chaque appel API AWS (qui a fait quoi, quand, depuis où). C'est essentiel pour l'audit de sécurité, la détection d'incidents et la conformité réglementaire. Les logs peuvent être envoyés vers S3 et CloudWatch Logs."
      },
      {
        label: "Question 11",
        text: "Quelle est la différence entre le chiffrement au repos et le chiffrement en transit ?",
        options: [
          "Il n'y a aucune différence",
          "Le chiffrement au repos protège les données stockées (EBS, S3, RDS), le chiffrement en transit protège les données pendant leur transfert réseau (TLS/SSL)",
          "Le chiffrement en transit est gratuit, le chiffrement au repos est payant",
          "Seul le chiffrement au repos est supporté par AWS"
        ],
        answer: 1,
        explanation: "Le <strong>chiffrement au repos</strong> protège les données sur le disque (AES-256 via KMS). Le <strong>chiffrement en transit</strong> protège les données pendant le transfert via <strong>TLS/SSL</strong>. Les deux sont recommandés et pris en charge par la plupart des services AWS."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
