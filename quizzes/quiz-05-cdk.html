<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 10 — CDK</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    .hint { font-size: 0.85rem; color: #f0ad4e; margin-bottom: 1rem; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"], .options input[type="checkbox"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 10 — CDK</h1>
    <p class="subtitle">Constructs L1/L2/L3, stacks, synth, deploy, testing</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 10</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Que signifie CDK dans le contexte AWS ?",
        options: [
          "Cloud Deployment Kit",
          "Cloud Development Kit",
          "Container Development Kit",
          "Cloud Data Kit"
        ],
        answer: 1,
        explanation: "<strong>AWS CDK</strong> (Cloud Development Kit) est un framework open-source qui permet de définir l'infrastructure cloud en utilisant des langages de programmation familiers (TypeScript, Python, Java, C#, Go)."
      },
      {
        label: "Question 2",
        text: "Quel est le rapport entre CDK et CloudFormation ?",
        options: [
          "CDK remplace totalement CloudFormation",
          "CDK génère des templates CloudFormation lors du cdk synth, puis les déploie via CloudFormation",
          "CloudFormation est un wrapper autour de CDK",
          "Ils sont complètement indépendants"
        ],
        answer: 1,
        explanation: "CDK est une couche d'abstraction au-dessus de CloudFormation. La commande <code>cdk synth</code> génère un template CloudFormation qui est ensuite déployé par CloudFormation lors de <code>cdk deploy</code>."
      },
      {
        label: "Question 3",
        text: "Quels sont les 3 niveaux de constructs dans CDK ?",
        options: [
          "Basic, Standard, Advanced",
          "L1 (CFN Resources), L2 (Higher-level avec des valeurs par défaut sensibles), L3 (Patterns combinant plusieurs ressources)",
          "Small, Medium, Large",
          "Dev, Staging, Production"
        ],
        answer: 1,
        explanation: "<strong>L1</strong> (CfnXxx) : mapping direct 1:1 avec CloudFormation. <strong>L2</strong> : abstraction avec des valeurs par défaut intelligentes et des méthodes pratiques (ex: <code>bucket.grantRead()</code>). <strong>L3</strong> (Patterns) : combinaison de plusieurs ressources pour un use case (ex: LambdaRestApi)."
      },
      {
        label: "Question 4",
        text: "Que fait la commande <code>cdk bootstrap</code> ?",
        options: [
          "Elle initialise un nouveau projet CDK",
          "Elle crée les ressources nécessaires dans le compte AWS (bucket S3, rôles IAM) pour permettre les déploiements CDK",
          "Elle lance les tests unitaires",
          "Elle génère la documentation du projet"
        ],
        answer: 1,
        explanation: "<code>cdk bootstrap</code> provisionne un stack CDKToolkit dans le compte/région cible contenant un bucket S3 (pour les assets), des rôles IAM et une table de versions. C'est nécessaire une seule fois par compte/région."
      },
      {
        label: "Question 5",
        text: "Que fait la commande <code>cdk synth</code> ?",
        options: [
          "Elle déploie l'infrastructure",
          "Elle synthétise le code CDK en un template CloudFormation (YAML/JSON) dans le dossier cdk.out",
          "Elle supprime toutes les ressources",
          "Elle synchronise les fichiers avec S3"
        ],
        answer: 1,
        explanation: "<code>cdk synth</code> compile et synthétise le code CDK en un template CloudFormation. C'est utile pour vérifier le template généré avant le déploiement et pour le debugging."
      },
      {
        label: "Question 6",
        text: "Qu'est-ce qu'un Stack dans CDK ?",
        options: [
          "Un fichier de configuration",
          "L'unité de déploiement dans CDK, correspondant à un stack CloudFormation",
          "Un conteneur Docker",
          "Un ensemble de tests"
        ],
        answer: 1,
        explanation: "Un <strong>Stack</strong> est l'unité de déploiement dans CDK. Il correspond à un stack CloudFormation. Toutes les ressources définies dans un stack sont déployées et gérées ensemble. On peut avoir plusieurs stacks dans une application CDK."
      },
      {
        label: "Question 7",
        text: "Comment CDK gère-t-il les permissions IAM entre les ressources ?",
        options: [
          "Il faut écrire manuellement toutes les politiques IAM",
          "Les constructs L2 offrent des méthodes grant (ex: table.grantReadData(lambda)) qui créent automatiquement les permissions nécessaires",
          "CDK ne gère pas les permissions IAM",
          "Toutes les ressources ont un accès administrateur par défaut"
        ],
        answer: 1,
        explanation: "Les constructs L2 offrent des méthodes <strong>grant</strong> pratiques : <code>bucket.grantRead(lambda)</code>, <code>table.grantReadWriteData(lambda)</code>. Elles créent automatiquement les politiques IAM avec le principe du moindre privilège."
      },
      {
        label: "Question 8",
        text: "Quel type de test peut-on écrire pour du code CDK ?",
        multi: true,
        options: [
          "Snapshot tests (vérifier que le template n'a pas changé de manière inattendue)",
          "Fine-grained assertions (vérifier qu'une ressource spécifique existe avec des propriétés précises)",
          "Validation tests (vérifier que le code lève une erreur pour des inputs invalides)",
          "Tests de performance du déploiement"
        ],
        answer: [0, 1, 2],
        explanation: "CDK supporte les <strong>snapshot tests</strong> (comparaison du template complet), les <strong>fine-grained assertions</strong> (avec <code>Template.hasResourceProperties()</code>) et les <strong>validation tests</strong> (vérification des erreurs). Les tests de performance de déploiement ne sont pas un pattern CDK standard."
      },
      {
        label: "Question 9",
        text: "Que fait la commande <code>cdk diff</code> ?",
        options: [
          "Elle compare le code TypeScript entre deux branches git",
          "Elle affiche les différences entre l'infrastructure déployée et le template local (avant de déployer)",
          "Elle liste les packages npm à mettre à jour",
          "Elle compare deux stacks entre eux"
        ],
        answer: 1,
        explanation: "<code>cdk diff</code> compare le template CloudFormation généré localement avec le stack actuellement déployé et affiche les changements (ajouts, modifications, suppressions de ressources). C'est essentiel pour vérifier avant un <code>cdk deploy</code>."
      },
      {
        label: "Question 10",
        text: "Qu'est-ce qu'un CDK Aspect ?",
        options: [
          "Un type de construct L3",
          "Un mécanisme permettant d'appliquer une opération (ex: tagging, validation) à tous les constructs d'un arbre CDK",
          "Un outil de visualisation de l'infrastructure",
          "Un plugin pour l'IDE"
        ],
        answer: 1,
        explanation: "Les <strong>Aspects</strong> permettent d'appliquer une opération de manière transversale à tous les constructs d'un arbre. Par exemple, ajouter des tags à toutes les ressources, vérifier que tous les buckets sont chiffrés, ou valider des conventions de nommage."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      const inputType = q.multi ? 'checkbox' : 'radio';
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.multi) html += `<p class="hint">⚠ Plusieurs réponses possibles</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="${inputType}" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      let correct = false;
      if (q.multi) {
        const selected = Array.from(document.querySelectorAll('input[name="q"]:checked')).map(el => parseInt(el.value)).sort();
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((v, i) => v === expected[i]);
      } else {
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        correct = parseInt(selected.value) === q.answer;
      }
      if (correct) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joué !' : 'Continuez à réviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
